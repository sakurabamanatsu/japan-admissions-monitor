name: Monitor universities and deploy website

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # GitHub cron uses UTC. These are 08:30-17:45 in Japan (JST).
    - cron: "30,45 23 * * *"
    - cron: "0,15,30,45 0-8 * * *"

concurrency:
  group: admissions-monitor
  cancel-in-progress: false

env:
  TARGET_ADMISSION_YEAR: "2027"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF reader
        if: github.event_name != 'push'
        run: python -m pip install -r requirements.txt

      - name: Check university websites
        if: github.event_name != 'push'
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MONITOR_BATCH: ${{ github.event_name == 'schedule' && 'auto' || 'all' }}
          MONITOR_BATCH_COUNT: "4"
        run: python github_monitor.py

      - name: Save monitoring state
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_state.json web/data.json
          if ! git diff --cached --quiet; then
            git commit -m "Update admissions monitoring data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
