<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本大学募集要项监控</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">留</span>
      <div>
        <strong>日本大学募集要项监控</strong>
        <span id="monitorState">正在连接监控服务</span>
      </div>
    </div>
    <div class="top-actions">
      <button class="icon-button" id="schoolsButton" title="管理学校" aria-label="管理学校">
        <span aria-hidden="true">⚙</span>
      </button>
      <button class="primary-button" id="scanButton">
        <span aria-hidden="true">↻</span>
        立即检查
      </button>
    </div>
  </header>

  <main>
    <section class="overview" aria-label="监控概况">
      <div>
        <p class="eyebrow">ADMISSIONS WATCH</p>
        <h1>留学生入试信息，一处查看</h1>
        <p class="intro">自动巡检已选择的大学官网，集中显示募集要项、出愿信息与 PDF 原文。</p>
      </div>
      <div class="metrics">
        <div class="metric"><span id="newCount">0</span><small>新发现</small></div>
        <div class="metric"><span id="schoolCount">0</span><small>监控学校</small></div>
        <div class="metric"><span id="pdfCount">0</span><small>PDF 要项</small></div>
        <div class="metric"><span id="totalCount">0</span><small>全部信息</small></div>
      </div>
    </section>

    <section class="workspace">
      <aside class="filters">
        <div class="filter-heading">
          <h2>筛选</h2>
          <button class="text-button" id="resetButton">清除</button>
        </div>
        <label>
          大学类型
          <select id="ownershipFilter">
            <option value="">全部类型</option>
            <option>国立</option>
            <option>公立</option>
            <option>私立</option>
          </select>
        </label>
        <label>
          地区
          <select id="regionFilter">
            <option value="">全部地区</option>
            <option>北海道</option><option>东北</option><option>关东</option>
            <option>中部</option><option>关西</option><option>九州</option><option>其他</option>
          </select>
        </label>
        <label>
          信息类别
          <select id="categoryFilter">
            <option value="">全部类别</option>
            <option>学部</option><option>大学院</option><option>募集要项</option><option>其他</option>
          </select>
        </label>
        <label class="check-row"><input type="checkbox" id="pdfFilter"> 只看 PDF</label>
        <label class="check-row"><input type="checkbox" id="newFilter"> 只看新发现</label>
        <div class="schedule-note">
          <span class="live-dot"></span>
          <div><strong>自动监控中</strong><small id="scheduleText">每 30 分钟检查</small></div>
        </div>
      </aside>

      <section class="results">
        <div class="result-toolbar">
          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索学校、募集要项或关键词">
          </div>
          <span id="resultCount">0 条结果</span>
        </div>
        <div id="resultList" class="result-list"></div>
        <div id="emptyState" class="empty-state" hidden>
          <strong>没有符合条件的信息</strong>
          <span>请更换关键词或清除筛选条件。</span>
        </div>
      </section>
    </section>
  </main>

  <dialog id="schoolDialog">
    <div class="dialog-head">
      <div><h2>监控学校</h2><p>启用后会加入下一轮自动检查。</p></div>
      <button class="icon-button" id="closeDialog" aria-label="关闭">×</button>
    </div>
    <form id="schoolForm">
      <input type="hidden" id="oldSchoolName">
      <div class="form-grid">
        <label>学校名称<input id="schoolName" required placeholder="例如：东京大学"></label>
        <label>大学类型
          <select id="schoolOwnership" required>
            <option>国立</option><option>公立</option><option>私立</option>
          </select>
        </label>
        <label>官网招生页面<input id="schoolUrl" type="url" required placeholder="https://..."></label>
      </div>
      <label class="check-row"><input type="checkbox" id="schoolActive" checked> 启用自动监控</label>
      <div class="form-actions">
        <button type="button" class="secondary-button" id="cancelEdit">取消</button>
        <button class="primary-button" type="submit">保存学校</button>
      </div>
    </form>
    <div id="schoolList" class="school-list"></div>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
